apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudseer-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/k0d1r/cloudseer.git'
    path: infrastructure/helm/bulutkahini
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: cloudseer-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
