version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: cloudseer
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:latest
    command: "-js"
    ports:
      - "4222:4222"

  # --- Microservices ---
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: ../../docker/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    depends_on:
      - postgres
      - redis

  data-collector:
    build:
      context: ./services/data-collector
      dockerfile: ../../docker/backend.Dockerfile
    depends_on:
      - nats

  cost-engine:
    build:
      context: ./services/cost-engine
      dockerfile: ../../docker/backend.Dockerfile
    depends_on:
      - postgres
      - nats

  digital-twin:
    build:
      context: ./services/digital-twin
      dockerfile: ../../docker/backend.Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    depends_on:
      - redis

  forecast-engine:
    build:
      context: ./services/forecast-engine
      dockerfile: ../../docker/ai-engine.Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - postgres

  agent-core:
    build:
      context: ./services/agent-core
      dockerfile: ../../docker/backend.Dockerfile
    ports:
      - "8083:8083"
    environment:
      - PORT=8083
    depends_on:
      - nats
      - redis

volumes:
  pgdata:
